apiVersion: apps/v1
kind: Deployment
metadata:
  name: beatbuddy-frontend
  namespace: beatbuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: beatbuddy-frontend
  template:
    metadata:
      labels:
        app: beatbuddy-frontend
    spec:
      containers:
        - name: frontend
          image: huisuz/beatbuddy-frontend:1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: beatbuddy-frontend-svc
  namespace: beatbuddy
spec:
  selector:
    app: beatbuddy-frontend
  ports:
    - port: 80
      targetPort: 80