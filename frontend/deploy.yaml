apiVersion: apps/v1
kind: Deployment
metadata:
  name: beatbuddy-frontend
  namespace: beatbuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: beatbuddy-frontend
  template:
    metadata:
      labels:
        app: beatbuddy-frontend
    spec:
      containers:
        - name: frontend
          image: huisuz/beatbuddy-frontend:2
          resources:
            requests:
              memory: "128Mi"
              cpu: "500m"
            limits:
              memory: "256Mi"
              cpu: "1000m"
          ports:
            - containerPort: 80