apiVersion: apps/v1
kind: Deployment
metadata:
  name: beatbuddy-backend
  namespace: beatbuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: beatbuddy-backend
  template:
    metadata:
      labels:
        app: beatbuddy-backend
    spec:
      containers:
        - name: backend
          image: huisuz/beatbuddy-backend:5
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: beatbuddy-backend-svc
  namespace: beatbuddy
spec:
  selector:
    app: beatbuddy-backend
  ports:
    - port: 8080
      targetPort: 8080